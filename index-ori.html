      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "BitSans", sans-serif;
        background: #111;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px 60px;
        gap: 28px;
      }

      .form-box {
        width: 100%;
        max-width: 520px;
        background: #1a1a1a;
        border: 1px solid #272727;
        border-radius: 16px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .form-head {
        font-size: 11px;
        font-weight: 700;
        color: #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-head .credit {
        font-size: 11px;
      }
      .form-head .credit a {
        font-size: 11px;
        color: #00ab6b;
        text-decoration: none;
      }
      .title-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #head-logo {
        width: 22px;
        height: 22px;
        object-fit: contain;
        display: block;
        flex-shrink: 0;
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .fg {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .fl {
        font-size: 11px;
        font-weight: 700;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      input {
        background: #222;
        border: 1px solid #2e2e2e;
        border-radius: 10px;
        padding: 11px 14px;
        color: #fff;
        font-family: "BitSans", sans-serif;
        font-size: 15px;
        font-weight: 400;
        outline: none;
        width: 100%;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #00ab6b;
      }
      input::placeholder {
        color: #333;
      }
      #fi-ticker {
        font-size: 20px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
      }
      .btn-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }
      .btn-gen {
        padding: 13px;
        background: #00ab6b;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: "BitSans", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-gen:hover {
        background: #009960;
      }
      .btn-gen:active {
        transform: scale(0.98);
      }
      .btn-rst {
        padding: 13px 18px;
        background: transparent;
        border: 1px solid #2e2e2e;
        border-radius: 10px;
        color: #444;
        font-family: "BitSans", sans-serif;
        font-size: 14px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-rst:hover {
        border-color: #555;
        color: #ccc;
      }

      .preview-section {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
        max-width: 900px;
      }
      .prev-label {
        font-size: 11px;
        color: #333;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      /* CARD 754x472 */
      #sb-card {
        position: relative;
        width: 754px;
        background: #0f172a;
        height: 472px;
        border-radius: 16px;
        overflow: hidden;
        flex-shrink: 0;
        font-family: "BitSans", sans-serif;
      }
      /* ── RESPONSIVE: skala kartu agar muat di layar kecil ── */
      .preview-section {
        overflow-x: hidden;
      }

      .card-scaler {
        width: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
      }

      @media (max-width: 800px) {
        .card-scaler {
          transform-origin: top center;
        }
        #sb-card {
          transform-origin: top left;
          transform: scale(
            calc(100vw / 754px)
          ); /* tidak bisa pakai calc langsung */
        }
      }
      #sb-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      #sb-ov {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none;
        font-family: "BitSans", sans-serif;
      }
      /* ─── SUBTITLE ROW ─── */
      .ov-sub-row {
        position: absolute;
        left: 50px;
        top: 108px;
        display: flex;
        align-items: baseline;
        gap: 7px;
      }

      /* "Return Saya di" — regular 15px abu muda */
      .ov-sub-label {
        font-family: "BitSans", sans-serif;
        left: 55px;
        top: 70px;
        font-weight: 400;
        font-size: 22px;
        color: #c8c8c8;
        letter-spacing: 0.1px;
        white-space: nowrap;
      }

      /* TICKER — bold, 20px, putih, underline warna profit/loss */
      .ticker-wrap {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-start;
      }

      /* TEXT */
      .ov-ticker {
        font-family: "BitSans", sans-serif;
        font-weight: 700;
        font-size: 27px;
        color: #ffffff;
        letter-spacing: 0.8px;
        white-space: nowrap;
        line-height: 1;

        /* HAPUS ini */
        /* text-decoration: underline; */
      }

      /* GARIS */
      .ticker-line {
        height: 2px;
        width: 100%;
        margin-top: 3px;
        background: #e74c3c; /* default */
      }

      /* WARNA IKUT STATE */
      .ov-ticker.t-profit + .ticker-line {
        background: #00ab6b;
      }

      .ov-ticker.t-loss + .ticker-line {
        background: #e74c3c;
      }

      /* BIG PERCENTAGE */
      .ov-pct {
        position: absolute;
        left: 41px;
        top: 179px;
        font-family: "BitSans", sans-serif;
        font-size: 85px;
        font-weight: 700;
        letter-spacing: 0px;
        line-height: 1;
        white-space: nowrap;
        display: flex;
        align-items: baseline;
        gap: 3px;
        max-width: 20%;
      }
      .ov-pct.profit {
        color: rgb(0, 171, 107);
      }
      .ov-pct.loss {
        color: #ffffff;
      }
      .ov-pct-num {
        font-family: "BitSans", sans-serif;
        font-weight: 700;
      }
      .ov-pct-sym {
        font-family: "BitSans", sans-serif;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: 10px;
        align-self: flex-end; /* atas/bawah: flex-start=atas | center=tengah | flex-end=bawah */
        margin-left: 4px; /* geser kanan, nilai negatif = kiri */
        margin-bottom: 13px; /* angkat ke atas, nilai negatif = turun ke bawah */
      }

      /* AVG */
      .ov-avg {
        position: absolute;
        left: 41px;
        top: 317px;
        font-family: "BitSans", sans-serif;
        font-size: 34px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.5px;
        line-height: 1;
      }

      /* NOW */
      .ov-now {
        position: absolute;
        left: 251px;
        top: 317px;
        font-family: "BitSans", sans-serif;
        font-size: 34px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.5px;
        line-height: 1;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .ov-arrow {
        width: 25px;
        height: 25px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }
      .ov-arrow svg {
        width: 25px;
        height: 25px;
      }

      /* Labels */
      .ov-lbl-avg {
        position: absolute;
        left: 41px;
        top: 363px;
        font-family: "BitSans", sans-serif;
        font-size: 24px;
        font-weight: 400;
        color: #888;
        letter-spacing: 0.3px;
      }
      .ov-lbl-now {
        position: absolute;
        left: 257px;
        top: 363px;
        font-family: "BitSans", sans-serif;
        font-size: 24px;
        font-weight: 400;
        color: #888;
        letter-spacing: 0.3px;
      }

      /* SAVE */
      .btn-save {
        padding: 13px 36px;
        background: #00ab6b;
        border: none;
        border-radius: 10px;
        color: #fff;
        font-family: "BitSans", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-save:hover {

    <script>
      const SVG_PROFIT =
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.67188 11.3333L11.3385 4.66663" stroke="#01B572" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.67188 4.66663H11.3385V11.3333" stroke="#01B572" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      const SVG_LOSS =
        '<svg width="300" height="300" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.6665 4.66663L11.3332 11.3333" stroke="#D74342" stroke-linecap="round" stroke-linejoin="round"/><path d="M11.3332 4.66663V11.3333H4.6665" stroke="#D74342" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      function scaleCard() {
        const card = document.getElementById("sb-card");
        if (!card) return;
        const container = card.parentElement;
        const containerW = container.offsetWidth;
        const cardW = 754;
        if (containerW < cardW) {
          const scale = containerW / cardW;
          card.style.transformOrigin = "top left";
          card.style.transform = `scale(${scale})`;
          card.style.marginBottom = `-${cardW * (1 - scale) * (472 / 754)}px`;
          container.style.height = `${472 * scale}px`;
        } else {
          card.style.transform = "";
          card.style.marginBottom = "";
          container.style.height = "";
        }
      }

      window.addEventListener("resize", scaleCard);

      // panggil setiap kali preview muncul
      const _origGenerate = generate;
      generate = function () {
        _origGenerate();
        setTimeout(scaleCard, 50);
      };

      // INPUT TICKER (AUTO FORMAT)
      document
        .getElementById("fi-ticker")
        .addEventListener("input", function () {
          this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
        });

      // FORMAT NUMBER
      function fmtN(n) {
        if (n >= 1000) return n.toLocaleString("id-ID");
        if (n % 1 !== 0) return parseFloat(n.toFixed(2)).toString();
        return n.toString();
      }

      // GENERATE PREVIEW
      function generate() {
        const ticker = document
          .getElementById("fi-ticker")
          .value.trim()
          .toUpperCase();

        const avg = parseFloat(document.getElementById("fi-avg").value);
        const now = parseFloat(document.getElementById("fi-now").value);

        if (!ticker) return flash("fi-ticker");
        if (!avg || avg <= 0) return flash("fi-avg");
        if (!now || now <= 0) return flash("fi-now");

        const pct = ((now - avg) / avg) * 100;
        const isProfit = pct >= 0;
        const sign = isProfit ? "+" : "";

        // SET TICKER
        const tickerEl = document.getElementById("c-ticker");
        tickerEl.textContent = ticker;
        tickerEl.className = "ov-ticker " + (isProfit ? "t-profit" : "t-loss");

        // SET PERCENT
        const pctText =
          sign + pct.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

        document.getElementById("c-pct").textContent = pctText;

        const pctWrap = document.getElementById("c-pct-wrap");
        pctWrap.className = "ov-pct " + (isProfit ? "profit" : "loss");

        // AUTO FONT SIZE (ANTI OVERFLOW)
        const maxWidth = 754 * 0.52;
        const baseFontSize = 85;
        const charWidth = baseFontSize * 0.62;
        const totalWidth = (pctText.length + 1) * charWidth;

        const finalSize = Math.max(
          28,
          Math.floor(
            Math.min(baseFontSize, (maxWidth / totalWidth) * baseFontSize),
          ),
        );

        pctWrap.style.fontSize = finalSize + "px";

        // % SYMBOL SCALE
        const sym = pctWrap.querySelector(".ov-pct-sym");
        const symSize = Math.max(18, Math.floor(finalSize * 0.635));
        sym.style.fontSize = symSize + "px";
        sym.style.marginBottom = Math.floor(finalSize * 0.15) + "px";

        // SET PRICE
        document.getElementById("c-avg").textContent = fmtN(avg);
        document.getElementById("c-now").textContent = fmtN(now);

        // ARROW
        document.getElementById("c-arrow").innerHTML = isProfit
          ? SVG_PROFIT
          : SVG_LOSS;

        // BUTTON STYLE
        document.getElementById("btn-save").className =
          "btn-save" + (isProfit ? "" : " loss-mode");

        // SHOW PREVIEW
        const ps = document.getElementById("preview-section");
        ps.style.display = "flex";
        ps.style.flexDirection = "column";
        ps.style.alignItems = "center";
        ps.style.gap = "16px";
      }

      // INPUT ERROR ANIMATION
      function flash(id) {
        const el = document.getElementById(id);
        el.style.borderColor = "#D74342";

        el.animate(
          [
            { transform: "translateX(-4px)" },
            { transform: "translateX(4px)" },
            { transform: "translateX(0)" },
          ],
          { duration: 180, iterations: 3 },
        );

        setTimeout(() => (el.style.borderColor = ""), 1400);
      }

      // RESET
      function resetAll() {
        ["fi-ticker", "fi-avg", "fi-now"].forEach((id) => {
          document.getElementById(id).value = "";
        });

        document.getElementById("preview-section").style.display = "none";
      }

      // CROP TRANSPARENT (HILANGIN PUTIH)
      function cropCanvas(canvas) {
        const ctx = canvas.getContext("2d");
        const { width, height } = canvas;
        const data = ctx.getImageData(0, 0, width, height).data;

        let top = null,
          left = null,
          right = null,
          bottom = null;

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const alpha = data[(y * width + x) * 4 + 3];
            if (alpha !== 0) {
              if (top === null) top = y;
              if (left === null || x < left) left = x;
              if (right === null || x > right) right = x;
              bottom = y;
            }
          }
        }

        if (top === null) return canvas;

        const cropped = document.createElement("canvas");
        const w = right - left + 1;
        const h = bottom - top + 1;

        cropped.width = w;
        cropped.height = h;

        cropped.getContext("2d").drawImage(canvas, left, top, w, h, 0, 0, w, h);

        return cropped;
      }

      // SAVE IMAGE (FIXED VERSION)
      async function saveImage() {
        const btn = document.getElementById("btn-save");
        const orig = btn.innerHTML;

        btn.innerHTML = "⏳ Menyimpan...";
        btn.disabled = true;

        try {
          await document.fonts.ready;

          // kasih delay biar layout stabil
          await new Promise((r) => setTimeout(r, 50));

          const canvas = await html2canvas(document.getElementById("sb-card"), {
            scale: 3,
            useCORS: false,
            allowTaint: true,
            backgroundColor: "#272727",
            logging: false,
          });

          // AUTO CROP (hilangin putih)
          const finalCanvas = cropCanvas(canvas);

          const ticker =
            document.getElementById("c-ticker").textContent || "saham";

          const pct = document
            .getElementById("c-pct")
            .textContent.replace("+", "")
            .trim();

          const a = document.createElement("a");
          a.download = `return-${ticker}-${pct}pct.png`;
          a.href = finalCanvas.toDataURL("image/png", 1.0);
          a.click();

          btn.innerHTML = "✓ Tersimpan!";

          setTimeout(() => {
            btn.innerHTML = orig;
            btn.disabled = false;
          }, 2000);
        } catch (e) {
          console.error(e);
          btn.innerHTML = "⚠ Gagal — coba lagi";
          btn.disabled = false;
        }
      }

      // ENTER = GENERATE
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") generate();
      });
    </script>
  </body>
</html>
